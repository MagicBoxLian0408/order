spring:
  application:
    name: order-local
  jackson:
    property-naming-strategy: SNAKE_CASE
  config:
    import:
      - file:services/order/env/local.env[.properties]
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    listener:
      ack-mode: record
      missing-topics-fatal: false
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.trusted.packages: "kr.magicbox.order.adapter.in.kafka.event"
        spring.json.type.mapping: order-prepare:kr.magicbox.order.adapter.in.kafka.event.OrderPrepareEventDto,delivery-started:kr.magicbox.order.adapter.in.kafka.event.DeliveryStartedEvent,delivery-completed:kr.magicbox.order.adapter.in.kafka.event.DeliveryCompletedEvent,payment-failed:kr.magicbox.order.adapter.in.kafka.event.PaymentFailedEvent,payment-cancel-succeeded:kr.magicbox.order.adapter.in.kafka.event.PaymentCancelSucceededEvent,payment-cancel-failed:kr.magicbox.order.adapter.in.kafka.event.PaymentCancelFailedEvent,stock-reserve-failed:kr.magicbox.order.adapter.in.kafka.event.StockReserveFailedEvent
    retry:
      topic:
        attempts: 3
        backoff:
          delay: 1s
          max-delay: 3s
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  grpc:
    client:
      channels:
        waiting-service:
          address: ${WAITING_SERVICE_URL}
          negotiation-type: plaintext

server:
  port: ${SERVER_PORT}


resilience4j:
  circuitbreaker:
    instances:
      waitingService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        minimumNumberOfCalls: 10
  timelimiter:
    instances:
      waitingService:
        timeoutDuration: 2s

inbox:
  max-event-age-minutes: 5

order:
  auto-confirm:
    days: 7
    chunk-size: 100
