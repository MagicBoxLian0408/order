spring:
  application:
    name: order-dev
  jackson:
    property-naming-strategy: SNAKE_CASE
  grpc:
    client:
      channels:
        waiting-service:
          address: ${WAITING_SERVICE_URL}
          negotiation-type: plaintext
        creator-service:
          address: ${CREATOR_SERVICE_URL}
          negotiation-type: plaintext
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    listener:
      ack-mode: record
      missing-topics-fatal: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.trusted.packages: "kr.magicbox.order.adapter.in.kafka.event"
        spring.json.type.mapping: order-prepare-confirmed:kr.magicbox.order.adapter.in.kafka.event.OrderPrepareConfirmedEvent,delivery-started:kr.magicbox.order.adapter.in.kafka.event.DeliveryStartedEvent,delivery-completed:kr.magicbox.order.adapter.in.kafka.event.DeliveryCompletedEvent,payment-succeeded:kr.magicbox.order.adapter.in.kafka.event.PaymentSucceededEvent,payment-failed:kr.magicbox.order.adapter.in.kafka.event.PaymentFailedEvent,payment-cancel-succeeded:kr.magicbox.order.adapter.in.kafka.event.PaymentCancelSucceededEvent,payment-cancel-failed:kr.magicbox.order.adapter.in.kafka.event.PaymentCancelFailedEvent,stock-reserve-succeeded:kr.magicbox.order.adapter.in.kafka.event.StockReserveSucceededEvent,stock-reserve-failed:kr.magicbox.order.adapter.in.kafka.event.StockReserveFailedEvent
    retry:
      topic:
        attempts: 3
        backoff:
          delay: 1s
          max-delay: 3s
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

resilience4j:
  circuitbreaker:
    instances:
      waitingService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 10
      creatorService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 10
  timelimiter:
    instances:
      waitingService:
        timeout-duration: 2s
      creatorService:
        timeout-duration: 2s

inbox:
  max-event-age-minutes: 5

order:
  auto-confirm:
    days: 7
    chunk-size: 100
